<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Anillo exterior con cortes para los textos -->
  <!-- Arriba izquierda -->
  <path d="M 70 30 A 70 70 0 0 1 130 30" fill="none" stroke="#e07900" stroke-width="6" stroke-linecap="round" />
  <!-- Abajo -->
  <path d="M 170 100 A 70 70 0 0 1 130 170" fill="none" stroke="#e07900" stroke-width="6" stroke-linecap="round" />
  <!-- Izquierda -->
  <path d="M 70 170 A 70 70 0 0 1 30 100" fill="none" stroke="#e07900" stroke-width="6" stroke-linecap="round" />
  <!-- Derecha -->
  <path d="M 30 100 A 70 70 0 0 1 70 30" fill="none" stroke="#e07900" stroke-width="6" stroke-linecap="round" />

  <!-- Puntos Cardinales (Texto) -->
  <text x="100" y="24" fill="#e07900" font-family="Arial, sans-serif" font-weight="bold" font-size="22" text-anchor="middle">N</text>
  <text x="100" y="192" fill="#e07900" font-family="Arial, sans-serif" font-weight="bold" font-size="22" text-anchor="middle">S</text>
  <text x="18" y="107" fill="#e07900" font-family="Arial, sans-serif" font-weight="bold" font-size="22" text-anchor="middle">W</text>
  <text x="182" y="107" fill="#e07900" font-family="Arial, sans-serif" font-weight="bold" font-size="22" text-anchor="middle">E</text>

  <!-- Aguja de la brújula -->
  <g transform="rotate(-30 100 100)">
    <!-- Punta Noroeste / Arriba -->
    <polygon points="100,35 112,95 100,100" fill="none" stroke="#e07900" stroke-width="3" />
    <polygon points="100,35 88,95 100,100" fill="none" stroke="#e07900" stroke-width="3" />
    <!-- Punta Sureste / Abajo -->
    <polygon points="100,165 112,105 100,100" fill="none" stroke="#e07900" stroke-width="3" />
    <polygon points="100,165 88,105 100,100" fill="none" stroke="#e07900" stroke-width="3" />
    <!-- Línea divisoria central -->
    <line x1="100" y1="35" x2="100" y2="165" stroke="#e07900" stroke-width="2" />
  </g>
</svg>
